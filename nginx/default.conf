# Songpeng 520 · nginx 反代 + 静态文件
# 默认仅 80 端口；HTTPS 需要先运行 certbot，详见 README。

# 全局速率限制：避免被狂刷登录接口
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# upstream
upstream app_upstream {
    server app:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 50m;
    server_tokens off;

    # gzip 静态资源
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/wasm image/svg+xml;
    gzip_min_length 1024;

    # 直接由 nginx 服务上传图片（uploads 走磁盘，最大化速度）
    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Next.js 自带静态资源
    location /_next/static/ {
        proxy_pass http://app_upstream;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 登录接口加 nginx 端速率限制（应用内还有一层）
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 其他全部反代到 Next 服务
    location / {
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}

